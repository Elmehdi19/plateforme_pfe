<h2 mat-dialog-title>Filière</h2>

<div mat-dialog-content>

  <mat-form-field appearance="outline" style="width: 100%">
    <mat-label>Code</mat-label>
    <input matInput [(ngModel)]="filiere.code">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Libellé</mat-label>
    <input matInput [(ngModel)]="filiere.libelle">
  </mat-form-field>

</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Annuler</button>
  <button mat-raised-button color="primary" (click)="save()">Enregistrer</button>
</div>
