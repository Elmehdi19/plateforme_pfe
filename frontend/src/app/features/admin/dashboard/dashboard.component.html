<div class="dashboard-container">
  <h1 class="title">Admin Dashboard</h1>

  <!-- Cartes statistiques compactes -->
  <div class="stats-grid">
    <div class="stat-card">
      <i class="fas fa-users stat-icon"></i>
      <h3>Étudiants</h3>
      <p>{{ totalEtudiants }}</p>
    </div>
    <div class="stat-card">
      <i class="fas fa-graduation-cap stat-icon"></i>
      <h3>Filières</h3>
      <p>{{ totalFilieres }}</p>
    </div>
    <div class="stat-card">
      <i class="fas fa-book stat-icon"></i>
      <h3>Modules</h3>
      <p>{{ totalModules }}</p>
    </div>
    <div class="stat-card">
      <i class="fas fa-calendar-alt stat-icon"></i>
      <h3>Semestres</h3>
      <p>{{ totalSemestres }}</p>
    </div>
  </div>

  <!-- Graphiques -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Moyenne des notes par module</h3>
      <div class="chart-container">
        <canvas #notesChart></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Décisions</h3>
      <div class="chart-container">
        <canvas #decisionChart></canvas>
      </div>
    </div>
  </div>

  <!-- Tableau derniers étudiants -->
  <div class="table-card">
    <h3>Derniers étudiants</h3>
    <div class="table-responsive">
      <table class="custom-table">
        <thead>
          <tr>
            <th>Nom</th>
            <th>Filière</th>
            <th>Semestre</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of lastEtudiants">
            <td>{{ e.nom }}</td>
            <td>{{ e.filiere }}</td>
            <td>{{ e.semestre }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
