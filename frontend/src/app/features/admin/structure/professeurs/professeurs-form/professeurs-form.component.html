<div class="container mt-4">
  <h2>{{ id ? 'Modifier' : 'Ajouter' }} un professeur</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-4">
    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Nom complet</label>
          <input type="text" class="form-control" formControlName="nom">
          <div *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched" class="text-danger">
            Nom requis
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email">
          <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-danger">
            Email valide requis
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Bureau</label>
          <input type="text" class="form-control" formControlName="bureau">
        </div>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Spécialité</label>
          <input type="text" class="form-control" formControlName="specialite">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Discipline</label>
          <input type="text" class="form-control" formControlName="discipline">
        </div>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <label class="form-label">Département</label>
          <input type="text" class="form-control" formControlName="departement">
        </div>
      </div>
    </div>

    <div class="form-check mb-3">
      <input type="checkbox" class="form-check-input" formControlName="responsableFiliere">
      <label class="form-check-label">Responsable de filière</label>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        {{ id ? 'Modifier' : 'Enregistrer' }}
      </button>
      <button type="button" class="btn btn-secondary" routerLink="/admin/professeurs">Annuler</button>
    </div>
  </form>
</div>
