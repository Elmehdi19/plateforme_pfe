<div class="container">
  <h2>{{ id ? 'Modifier' : 'Nouvelle' }} année</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nom *</label>
      <input type="text" formControlName="nom" class="form-control" />
    </div>
    <div class="form-group">
      <label>Ordre</label>
      <input type="number" formControlName="ordre" class="form-control" />
    </div>
    <div class="form-check">
      <input type="checkbox" formControlName="diplômante" class="form-check-input" id="diplomante" />
      <label class="form-check-label" for="diplomante">Année diplômante</label>
    </div>
    <div class="form-group">
      <label>Filière</label>
      <select formControlName="filiereId" class="form-control">
        <option [value]="null">-- Sélectionner --</option>
        <option *ngFor="let f of filieres" [value]="f.id">{{ f.nom }}</option>
      </select>
    </div>
    <button type="submit" [disabled]="form.invalid" class="btn btn-primary">Enregistrer</button>
    <button type="button" class="btn btn-secondary" (click)="annuler()">Annuler</button>
  </form>
</div>
