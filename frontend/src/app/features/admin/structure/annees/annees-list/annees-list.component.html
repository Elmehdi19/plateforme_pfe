<div class="container">
  <h2>Années d'étude</h2>
  <button class="btn btn-primary mb-3" (click)="nouvelle()">Nouvelle année</button>
  <table class="table">
    <thead>
      <tr>
        <th>Nom</th>
        <th>Ordre</th>
        <th>Diplômante</th>
        <th>Filière</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of annees">
        <td>{{ a.nom }}</td>
        <td>{{ a.ordre }}</td>
        <td>{{ a['diplômante'] ? 'Oui' : 'Non' }}</td>
        <td>{{ a.filiereNom }}</td>
        <td>
          <button class="btn btn-sm btn-info" (click)="edit(a.id!)">Modifier</button>
          <button class="btn btn-sm btn-danger" (click)="delete(a.id!)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
