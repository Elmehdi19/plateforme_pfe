<div class="container mt-4">
  <h2>{{ id ? 'Modifier' : 'Nouveau' }} département</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nom *</label>
      <input type="text" class="form-control" formControlName="nom" />
    </div>
    <div class="form-group">
      <label>Code</label>
      <input type="text" class="form-control" formControlName="code" />
    </div>
    <div class="form-group">
      <label>Établissement</label>
      <select class="form-control" formControlName="etablissementId">
        <option [ngValue]="null">-- Aucun --</option>
        <option *ngFor="let e of etablissements" [ngValue]="e.id">{{ e.nom }}</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Enregistrer</button>
    <button type="button" class="btn btn-secondary" (click)="annuler()">Annuler</button>
  </form>
</div>
