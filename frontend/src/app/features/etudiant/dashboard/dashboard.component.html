<div class="dashboard-container">
  <h2>Bienvenue, {{ nom }}</h2>
  <p>{{ email }}</p>

  <div class="row mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <h3>Moyenne générale</h3>
        <p class="stat">{{ moyenneGenerale | number:'1.2-2' }}</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <h3>Absences</h3>
        <p class="stat">{{ nbAbsences }}</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Dernières notes</div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Élément</th>
              <th>Note</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let n of dernieresNotes">
              <td>{{ n.elementNom || 'N/A' }}</td>
              <td>{{ n.valeur }}</td>
              <td>{{ n.dateEvaluation | date:'shortDate' }}</td>
            </tr>
            <tr *ngIf="dernieresNotes.length === 0">
              <td colspan="3" class="text-center">Aucune note disponible</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
