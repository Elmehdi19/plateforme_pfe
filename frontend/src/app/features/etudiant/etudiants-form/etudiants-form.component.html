<div class="container">
  <div class="card">
    <h2>{{ id ? 'Modifier' : 'Nouvel' }} étudiant</h2>
    <form [formGroup]="etudiantForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Matricule *</label>
            <input type="text" formControlName="matricule" class="form-control" />
          </div>
          <div class="form-group">
            <label>CNE</label>
            <input type="text" formControlName="cne" class="form-control" />
          </div>
          <div class="form-group">
            <label>CIN</label>
            <input type="text" formControlName="cin" class="form-control" />
          </div>
          <div class="form-group">
            <label>Nom complet</label>
            <input type="text" formControlName="nom" class="form-control" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" class="form-control" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Nationalité</label>
            <input type="text" formControlName="nationalite" class="form-control" />
          </div>
          <div class="form-group">
            <label>Sexe</label>
            <select formControlName="sexe" class="form-control">
              <option value="">--</option>
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date de naissance</label>
            <input type="date" formControlName="dateNaissance" class="form-control" />
          </div>
          <div class="form-group">
            <label>Lieu de naissance</label>
            <input type="text" formControlName="lieuNaissance" class="form-control" />
          </div>
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" formControlName="adresse" class="form-control" />
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Filière</label>
        <select formControlName="filiereId" class="form-control">
          <option *ngFor="let f of filieres" [value]="f.id">{{ f.nom }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Année</label>
        <input type="number" formControlName="annee" class="form-control" />
      </div>
      <div class="form-actions">
        <button type="submit" [disabled]="etudiantForm.invalid" class="btn btn-primary">Enregistrer</button>
        <button type="button" class="btn btn-secondary" (click)="annuler()">Annuler</button>
      </div>
    </form>
  </div>
</div>
