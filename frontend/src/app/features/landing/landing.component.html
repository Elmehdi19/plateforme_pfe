<div class="landing-container">
  <!-- Hero section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Plateforme de Gestion Pédagogique</h1>
      <p class="tagline">Simplifiez la gestion des notes, délibérations et prédictions pour votre établissement.</p>
      <div class="cta-buttons">
        <a routerLink="/login" class="btn btn-primary">Se connecter</a>
        <a href="#features" class="btn btn-outline">En savoir plus</a>
      </div>
    </div>
    <div class="hero-image">
      <!-- Illustration ou image de fond (optionnelle) -->
      <div class="floating-card">🎓</div>
    </div>
  </section>

  <!-- Features section -->
  <section id="features" class="features">
    <h2>Fonctionnalités clés</h2>
    <div class="features-grid">
      <div class="feature-card" *ngFor="let f of features">
        <div class="feature-icon">{{ f.icon }}</div>
        <h3>{{ f.title }}</h3>
        <p>{{ f.description }}</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 – Projet PFE – Mehdi & Binôme</p>
  </footer>
</div>
