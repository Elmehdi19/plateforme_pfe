<div class="container mt-4">
  <h2>Gestion des absences</h2>
  <div class="card">
    <div class="card-body">
      <div class="form-group">
        <label>Étudiant</label>
        <select class="form-control" [(ngModel)]="selectedEtudiantId">
          <option [ngValue]="null">-- Sélectionner --</option>
          <option *ngFor="let e of etudiants" [ngValue]="e.id">{{ e.nom }} ({{ e.matricule }})</option>
        </select>
      </div>
      <div class="form-group">
        <label>Élément</label>
        <select class="form-control" [(ngModel)]="selectedElementId">
          <option [ngValue]="null">-- Sélectionner --</option>
          <option *ngFor="let el of elements" [ngValue]="el.id">{{ el.nom }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" class="form-control" [(ngModel)]="dateAbsence" />
      </div>
      <div class="form-check">
        <input type="checkbox" class="form-check-input" [(ngModel)]="justifiee" id="justifiee">
        <label class="form-check-label" for="justifiee">Absence justifiée</label>
      </div>
      <div class="form-group">
        <label>Motif</label>
        <textarea class="form-control" rows="3" [(ngModel)]="motif"></textarea>
      </div>
      <button class="btn btn-primary" (click)="onSubmit()">Enregistrer l'absence</button>
    </div>
  </div>
</div>
