<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">Changer le mot de passe</h2>
      <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
        <!-- champs existants -->
        <div class="mb-3">
          <label class="form-label">Mot de passe actuel</label>
          <input type="password" class="form-control" formControlName="currentPassword">
          <div *ngIf="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched" class="text-danger">
            Le mot de passe actuel est requis.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <input type="password" class="form-control" formControlName="newPassword">
          <div *ngIf="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched" class="text-danger">
            Le nouveau mot de passe doit comporter au moins 6 caractères.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirmer le nouveau mot de passe</label>
          <input type="password" class="form-control" formControlName="confirmPassword">
          <div *ngIf="passwordForm.errors?.['mismatch'] && passwordForm.get('confirmPassword')?.touched" class="text-danger">
            Les mots de passe ne correspondent pas.
          </div>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="passwordForm.invalid">
          Changer le mot de passe
        </button>
        <!-- Ajout du bouton retour -->
        <button type="button" class="btn btn-secondary ms-2" (click)="goBack()">
          Retour au tableau de bord
        </button>
      </form>
    </div>
  </div>
</div>
