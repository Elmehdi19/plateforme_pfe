<!-- src/app/features/import/import.component.html -->
<div class="container">
  <h2>Import Excel</h2>
  <p>Sélectionnez un fichier Excel pour importer des données.</p>

  <div class="form-group">
    <label>Type de données</label>
    <select class="form-control" [(ngModel)]="selectedType">
      <option *ngFor="let t of types" [value]="t.value">{{ t.label }}</option>
    </select>
  </div>

  <div class="form-group">
    <label>Fichier Excel (.xlsx ou .xls)</label>
    <input type="file" id="fileInput" class="form-control-file" (change)="onFileSelected($event)" accept=".xlsx,.xls" />
  </div>

  <button class="btn btn-primary" (click)="onUpload()" [disabled]="!file">Importer</button>

  <div *ngIf="message" class="alert alert-info mt-3">{{ message }}</div>
</div>
