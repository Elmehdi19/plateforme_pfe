services:
  app:
    image: ghcr.io/elmehdi19/plateforme_pfe:latest  
    container_name: pfe-backend
    restart: always
    environment:
      DB_URL: jdbc:mysql://host.docker.internal:3306/gestion_notes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 12345
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"